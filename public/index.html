<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Note IT</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-glow glow-one"></div>
  <div class="bg-glow glow-two"></div>

  <main class="app-shell">
    <header class="topbar glass">
      <div>
        <h1>Note IT</h1>
        <p class="subtitle">Your calm, local-first writing space.</p>
      </div>
      <div class="topbar-right">
        <div class="clock-box">
          <div class="clock-flag" aria-hidden="true"></div>
          <div class="clock-content">
            <div class="clock-label">Ireland Time</div>
            <div class="clock-value" id="irelandTime">--:--:--</div>
            <div class="clock-date" id="irelandDate">--</div>
          </div>
        </div>
        <div class="streak-box">
          <div class="streak-label">Writing Streak</div>
          <div class="streak-value"><span id="streakCurrent">0</span> days</div>
          <div class="streak-hint">Longest: <span id="streakLongest">0</span></div>
        </div>
      </div>
    </header>

    <section class="layout">
      <aside class="panel glass calendar-panel">
        <div class="calendar-head">
          <button id="prevMonthBtn" class="icon-btn" aria-label="Previous month">◀</button>
          <h2 id="calendarMonthLabel"></h2>
          <button id="nextMonthBtn" class="icon-btn" aria-label="Next month">▶</button>
        </div>
        <div class="calendar-grid week-header" id="weekHeader"></div>
        <div class="calendar-grid" id="calendarGrid"></div>

        <div class="mood-wrap">
          <h3>Today's Mood</h3>
          <div class="mood-list" id="moodList">
            <button data-mood="excited" class="mood-btn">Excited</button>
            <button data-mood="happy" class="mood-btn">Happy</button>
            <button data-mood="calm" class="mood-btn">Calm</button>
            <button data-mood="focused" class="mood-btn">Focused</button>
            <button data-mood="tired" class="mood-btn">Tired</button>
            <button data-mood="sad" class="mood-btn">Sad</button>
          </div>
        </div>
      </aside>

      <section class="panel glass editor-panel">
        <div class="editor-header">
          <input id="noteTitle" class="title-input" type="text" placeholder="Journal title..." />
          <div class="day-chip">Selected: <span id="selectedDateLabel"></span></div>
        </div>

        <div class="toolbar" id="toolbar">
          <button data-cmd="bold"><b>B</b></button>
          <button data-cmd="italic"><i>I</i></button>
          <button data-cmd="underline"><u>U</u></button>
          <button data-cmd="insertUnorderedList">• List</button>
          <button data-cmd="formatBlock" data-value="h2">H2</button>
          <button data-cmd="formatBlock" data-value="blockquote">Quote</button>
          <button id="linkBtn">Link</button>
          <button id="clearBtn">Clear</button>
        </div>

        <div id="editor" class="editor" contenteditable="true"></div>
        <div class="writing-metrics">
          <span>Words: <strong id="wordCount">0</strong></span>
          <span>Read time: <strong id="readTime">0 min</strong></span>
        </div>

        <div class="actions">
          <button id="newBtn" class="btn secondary">New Note</button>
          <button id="saveBtn" class="btn primary">Save Note</button>
          <button id="shareBtn" class="btn tertiary" disabled>Share Note</button>
          <button id="deleteBtn" class="btn danger" disabled>Delete</button>
        </div>

        <div id="shareBox" class="share-box hidden">
          <label for="shareUrlInput">Share URL (local instance):</label>
          <div class="share-row">
            <input id="shareUrlInput" type="text" readonly />
            <button id="copyShareBtn" class="btn tertiary">Copy</button>
          </div>
        </div>

        <p id="statusText" class="status-text"></p>
      </section>

      <aside class="panel glass notes-panel">
        <h3>All Notes</h3>
        <div id="notesList" class="notes-list"></div>
      </aside>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
